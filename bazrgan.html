<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>یاری بازرگانی کوردی </title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--sky-1:#e0f2fe;--sky-2:#bae6fd;--sky-3:#7dd3fc;--sky-4:#38bdf8;
--sky-5:#0ea5e9;--sky-6:#0284c7;--sky-7:#0369a1;--sky-8:#075985;
--sky-9:#0c4a6e;--sky-10:#082f4e;--sky-11:#051e35;--sky-12:#030f1c;

--amber-1:#fffbeb;--amber-2:#fef3c7;--amber-3:#fde68a;--amber-4:#fcd34d;
--amber-5:#fbbf24;--amber-6:#f59e0b;--amber-7:#d97706;

--glass-bg:#faf7f0;
--glass-border:rgba(245,158,11,0.18);
--glass-blur:blur(22px);
--white:#1e2433;
--w90:rgba(30,36,48,0.88);
--w70:rgba(30,36,48,0.66);
--w50:rgba(30,36,48,0.46);
--w40:rgba(30,36,48,0.38);
--w30:rgba(30,36,48,0.22);
--w15:rgba(30,36,48,0.10);
--w08:rgba(30,36,48,0.05);
--w04:rgba(30,36,48,0.03);
--green:#16a34a;--gbg:rgba(22,163,74,0.10);
--red:#dc2626;--rbg:rgba(220,38,38,0.10);
--amber:#d97706;--abg:rgba(217,119,6,0.10);
--font-kuf:'Noto Sans Arabic',sans-serif;
--font-nas:'Noto Sans Arabic',sans-serif;
--r6:6px;--r10:10px;--r14:14px;--r18:18px;--r24:24px;--r32:32px;
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:var(--font-kuf);
  background:linear-gradient(135deg,#fff7cf 0%,#ffd84d 100%);
  min-height:100vh;direction:rtl;
  -webkit-font-smoothing:antialiased;
  color:var(--w90);
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:linear-gradient(135deg,#fff7cf 0%,#ffd84d 100%);
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--w15);border-radius:4px}
button{cursor:pointer;font-family:var(--font-kuf)}
input{font-family:var(--font-kuf)}

/* ── NAVBAR ── */
.nav{
  position:sticky;top:0;z-index:300;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--glass-border);
  border-radius:0 0 var(--r18) var(--r18);
}
.nav-brand{
  display:flex;align-items:center;gap:10px;
  font-family:var(--font-nas);font-size:1.05rem;font-weight:800;
  color:var(--white);white-space:nowrap;
}
.nav-stats{display:flex;gap:6px}
.stat-pill{
  display:flex;flex-direction:column;align-items:center;
  background:var(--w08);
  border:1px solid var(--glass-border);
  border-radius:var(--r14);padding:5px 14px;min-width:80px;
  backdrop-filter:blur(10px);
}
.stat-pill-lbl{font-size:0.6rem;color:var(--w50);line-height:1.2}
.stat-pill-val{font-size:0.82rem;font-weight:700;color:var(--white);margin-top:1px}



.prow.row-up { 
  background: rgba(22,163,74,0.05); 
  border-right: 3px solid var(--green); 
}
.prow.row-dn { 
  background: rgba(220,38,38,0.05); 
  border-right: 3px solid var(--red); 
}
.prow.row-fl { 
  background: rgba(217,119,6,0.05); 
  border-right: 3px solid var(--amber); 
}

.price-legend { 
  display:flex; gap:14px; 
  padding:12px 18px;
  border-bottom:1px solid var(--glass-border);
}

.leg { display:flex; align-items:center; gap:5px; font-size:0.74rem; }
.leg.up { color:var(--green); }
.leg.dn { color:var(--red); }
.leg.fl { color:var(--amber); }


.bottom-nav {
  position: fixed;
  bottom: clamp(12px, 4vw, 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: clamp(8px, 2.5vw, 14px);
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid rgba(255,255,255,0.55);
  border-radius: 999px;
  padding: 10px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12),
              inset 0 1px 0 rgba(255,255,255,0.6);
}

.nav-item {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: transparent;
  color: #6b6b6b;
  font-size: 15px;
  font-weight: 400;
  white-space: nowrap;
  flex-shrink: 0;
  will-change: transform;
  transition: background 0.2s ease, color 0.2s ease, padding 0.2s ease;
}

.nav-item.active {
  background: #FFD400;
  color: #111;
  padding: 9px 16px 9px 12px;
  font-weight: 700;
}

.nav-item svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  fill: currentColor;
  transition: transform 0.2s ease;
}

.nav-item.active svg {
  transform: scale(1.1);
}

.nav-label {
  display: inline-block;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  opacity: 0;
  margin-right: 0;
  transition: width 0.2s ease, opacity 0.15s ease, margin-right 0.2s ease;
}

.nav-item.active .nav-label {
  width: var(--lw, 48px);
  opacity: 1;
  margin-right: 6px;
}

@keyframes navBounce {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.25); }
  60%  { transform: scale(0.92); }
  100% { transform: scale(1.1); } /* کۆتایی وەک active state */
}
.nav-item.bump svg {
  animation: navBounce 0.4s cubic-bezier(.34,1.56,.64,1);
}



/* ── PAGES ── */
.page { display:none; padding:20px 16px 110px; max-width:1200px; margin:0 auto }
.page.active { display:block }
#p-prices.page{
  max-width:none;
  margin:0;
  padding:0;
}


/* ── SEC HEAD ── */
.sec-head{margin-bottom:20px}
.sec-title{font-family:var(--font-nas);font-size:1.4rem;font-weight:700;color:var(--white)}
.sec-sub{font-size:0.75rem;color:var(--w50);margin-top:3px}

/* ── DASHBOARD HERO ── */
.dash-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#fcd34d 0%,#38bdf8 55%,#0284c7 100%);
  border-radius:var(--r24);
  padding:22px 22px 24px;margin-bottom:14px;
  color:#fff;
  box-shadow:0 14px 36px rgba(2,132,199,0.22);
}
.dash-hero::before{
  content:'';position:absolute;inset:0;
  background:
	radial-gradient(circle at 90% -10%,rgba(255,255,255,0.35) 0%,transparent 45%),
	radial-gradient(circle at -10% 110%,rgba(255,255,255,0.18) 0%,transparent 50%);
  pointer-events:none;
}
.dash-hero-top{display:flex;justify-content:flex-end;margin-bottom:10px;position:relative;z-index:1}
.dash-hero-day{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.25);
  border-radius:20px;padding:5px 14px;font-size:0.72rem;font-weight:700;
}
.dash-hero-day i{font-size:14px}
.dash-hero-lbl{font-size:0.75rem;opacity:.9;margin-bottom:4px;position:relative;z-index:1}
.dash-hero-val{font-family:var(--font-nas);font-size:clamp(1.7rem,7vw,2.3rem);font-weight:800;margin-bottom:18px;position:relative;z-index:1}
.dash-hero-row{display:flex;gap:10px;position:relative;z-index:1}
.dash-hero-item{
  flex:1;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--r14);padding:10px 12px;
  backdrop-filter:blur(6px);min-width:0;
}
.dhi-ic{width:34px;height:34px;border-radius:var(--r10);background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dhi-ic i{font-size:16px;color:#fff}
.dhi-lbl{font-size:0.64rem;opacity:.9}
.dhi-val{font-size:0.92rem;font-weight:700;white-space:nowrap}
.dhi-val.up{color:#bbf7d0}
.dhi-val.dn{color:#fecaca}

/* ── KPI ROW ── */
.kpi-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;margin-bottom:18px;
}
.kpi-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(10px);
  border-radius:var(--r18);padding:16px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
.kpi-card:hover{border-color:var(--sky-4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,158,11,0.1)}
.kpi-lbl{font-size:0.68rem;color:var(--w50);margin-bottom:5px}
.kpi-val{font-size:1.15rem;font-weight:700;color:var(--white)}
.kpi-val.up{color:var(--green)}
.kpi-val.dn{color:var(--red)}
.kpi-ic{
  width:34px;height:34px;border-radius:var(--r10);
  background:var(--w08);
  display:flex;align-items:center;justify-content:center;
}
.kpi-ic i{font-size:17px;color:var(--sky-6)}

/* ── EVENT BOX ── */
.event-box{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-right:3px solid var(--amber-6);
  border-radius:var(--r14);padding:14px 16px;
  margin-bottom:20px;
  animation:slideIn .35s ease;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.event-ic{
  width:30px;height:30px;border-radius:var(--r10);
  background:rgba(245,158,11,0.14);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.event-ic i{font-size:15px;color:var(--amber-7)}
.event-day{font-size:0.63rem;color:var(--w50);margin-bottom:2px}
.event-msg{font-size:0.85rem;color:var(--w70);line-height:1.65}

/* ── LOAN CARD ── */
.loan-card{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--r18);padding:16px;margin-bottom:20px;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
.loan-empty{display:flex;align-items:center;gap:12px}
.loan-empty-ic{
  width:42px;height:42px;border-radius:var(--r10);
  background:var(--w08);display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.loan-empty-ic i{font-size:20px;color:var(--sky-6)}
.loan-empty-title{font-size:0.85rem;font-weight:700;color:var(--white)}
.loan-empty-sub{font-size:0.7rem;color:var(--w50);margin-top:2px}
.loan-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.loan-warn{
  display:flex;align-items:center;gap:8px;
  background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.2);
  color:var(--red);border-radius:var(--r10);padding:10px 12px;
  font-size:0.74rem;line-height:1.5;margin-top:8px;
}
.loan-warn i{font-size:16px;flex-shrink:0}
.loan-opt{
  background:var(--w08);border:1px solid var(--glass-border);
  border-radius:var(--r14);padding:12px 14px;margin-bottom:8px;
  transition:border-color .15s,transform .12s;
}
.loan-opt:hover{border-color:var(--sky-4);transform:translateY(-1px)}
.loan-opt-amt{font-size:1rem;font-weight:700;color:var(--white)}
.loan-opt-info{font-size:0.7rem;color:var(--w50);margin-top:3px}
.loan-opt-row{display:flex;justify-content:space-between;align-items:center}
.loan-opt-btn{
  background:linear-gradient(135deg,var(--sky-5),var(--sky-7));
  color:#fff;border:none;border-radius:var(--r10);
  padding:7px 16px;font-size:0.76rem;font-weight:700;flex-shrink:0;
  transition:opacity .15s;
}
.loan-opt-btn:hover{opacity:.85}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;gap:6px;flex-wrap:nowrap;
  overflow-x:auto;padding-bottom:4px;
  margin-bottom:16px;
  scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.fc{
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  background:var(--w08);border:1px solid var(--glass-border);
  color:var(--w50);border-radius:20px;
  padding:6px 14px;font-size:0.76rem;font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.fc i{font-size:14px}
.fc:hover{border-color:var(--sky-4);color:var(--w70)}
.fc.active{
  background:rgba(2,132,199,0.12);
  border-color:rgba(2,132,199,0.4);
  color:var(--sky-7);
}

/* ── MARKET GRID ── */
.market-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:14px;
}

/* ── MARKET CARD (item-first) ── */
.mcard{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--r24);
  overflow:hidden;
  backdrop-filter:blur(12px);
  transition:transform .2s,border-color .2s,box-shadow .2s;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
.mcard:hover{transform:translateY(-3px);border-color:var(--sky-4);box-shadow:0 10px 28px rgba(245,158,11,0.12)}

.mcard-img{
  width:100%;height:130px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
}
.mcard-img-bg{
  position:absolute;inset:0;
  opacity:0.18;
}
.mcard-img i{font-size:52px;position:relative;z-index:1;opacity:.95}

.mcard-body{padding:14px 16px 16px}

.mcard-row1{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:8px;
}
.mcard-name{font-size:0.92rem;font-weight:700;color:var(--white);line-height:1.3}
.mcard-sub{font-size:0.68rem;color:var(--w50);margin-top:2px}
.mcard-badge{
  font-size:0.6rem;font-weight:700;padding:3px 9px;
  border-radius:20px;white-space:nowrap;flex-shrink:0;margin-right:6px;
}

.mcard-price-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.mcard-price{font-size:1.1rem;font-weight:700;color:var(--white)}
.cpill{
  display:flex;align-items:center;gap:2px;
  font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:20px;
}
.cpill i{font-size:10px}
.cpill.up{background:var(--gbg);color:var(--green)}
.cpill.dn{background:var(--rbg);color:var(--red)}
.cpill.fl{background:var(--w08);color:var(--w50)}

.mcard-detail{
  font-size:0.72rem;color:var(--w50);line-height:1.55;
  padding:8px 10px;
  background:var(--w04);border-radius:var(--r10);
  margin-bottom:12px;
}

.mcard-owned-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(22,163,74,0.10);
  border:1px solid rgba(22,163,74,0.25);
  color:var(--green);font-size:0.62rem;font-weight:700;
  padding:3px 9px;border-radius:20px;margin-bottom:10px;
}
.mcard-owned-badge i{font-size:11px}

.mcard-actions{display:flex;gap:8px}
.btn-buy,.btn-sell,.btn-more{
  flex:1;height:36px;display:flex;align-items:center;justify-content:center;gap:5px;
  border:none;border-radius:var(--r10);
  font-size:0.78rem;font-weight:700;
  transition:opacity .15s,transform .12s;
}
.btn-buy{
  background:linear-gradient(135deg,var(--sky-5),var(--sky-7));
  color:#fff;
}
.btn-sell{background:var(--rbg);color:var(--red);border:1px solid rgba(220,38,38,.22)}
.btn-more{background:var(--w08);color:var(--w70);border:1px solid var(--glass-border)}
.btn-buy:hover,.btn-sell:hover,.btn-more:hover{opacity:.85;transform:scale(1.02)}
.btn-buy:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-buy i,.btn-sell i,.btn-more i{font-size:14px}

/* ── PORTFOLIO ── */
.port-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.pstat{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:var(--r14);padding:13px 15px;
  backdrop-filter:blur(10px);
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
.pstat-lbl{font-size:0.66rem;color:var(--w50)}
.pstat-val{font-size:0.98rem;font-weight:700;color:var(--white);margin-top:4px}

/* ── PRICES TABLE ── */
.ptable{
  background:var(--glass-bg);border:1px solid var(--glass-border);
  border-radius:var(--r18);overflow:hidden;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 18px rgba(245,158,11,0.06);
}
.ptable-head{
  display:grid;grid-template-columns:1fr 130px 100px 100px;
  padding:10px 18px;background:var(--w04);
  font-size:0.65rem;color:var(--w40);font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--glass-border);
}
.prow{
  display:grid;grid-template-columns:1fr 130px 100px 100px;
  align-items:center;padding:12px 18px;
  border-bottom:1px solid var(--w04);transition:background .15s;
}
.prow:last-child{border-bottom:none}
.prow:hover{background:var(--w04)}
.prow-name{display:flex;align-items:center;gap:10px}
.prow-ic{
  width:30px;height:30px;border-radius:var(--r10);
  background:var(--w08);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.prow-ic i{font-size:15px}
.prow-main{font-size:0.83rem;font-weight:600;color:var(--white)}
.prow-cat{font-size:0.65rem;color:var(--w50);margin-top:1px}
.prow-price{font-size:0.85rem;font-weight:700;color:var(--white)}
.prow-owned{font-size:0.78rem;color:var(--w50)}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--w50)}
.empty-ic{
  width:52px;height:52px;border-radius:50%;
  background:var(--w08);margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
}
.empty-ic i{font-size:24px;color:var(--sky-6)}
.empty h3{font-size:.9rem;color:var(--w70);margin-bottom:5px}
.empty p{font-size:.78rem;margin-bottom:16px}
.btn-primary{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--sky-5),var(--sky-7));
  color:#fff;border:none;border-radius:var(--r10);
  padding:9px 20px;font-size:.8rem;font-weight:700;
  transition:opacity .15s;
}
.btn-primary:hover{opacity:.9}
.btn-primary i{font-size:15px}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(120,90,20,0.18);
  backdrop-filter:blur(12px);z-index:900;
  align-items:center;justify-content:center;padding:16px;
}
.modal-bg.open{display:flex}
.modal{
  background:rgba(255,255,255,0.88);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(24px);
  border-radius:var(--r24);padding:22px;
  width:100%;max-width:420px;position:relative;
  animation:mpop .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 50px rgba(245,158,11,0.18);
  max-height:88vh;overflow-y:auto;
}
@keyframes mpop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.modal-x{

/* ── TOAST ── */
.toast{
  position:fixed;bottom:96px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(255,255,255,0.92);border:1px solid var(--glass-border);
  color:var(--white);padding:10px 20px;
  border-radius:var(--r14);font-size:0.82rem;font-weight:600;

  transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s, visibility .3s;

  opacity:0;
  visibility:hidden;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}

const fmt=n=>{const a=Math.abs(n),s=n<0?'-':'';return a>=1e6?s+'$'+(a/1e6).toFixed(2)+'M':a>=1000?s+'$'+Math.round(a).toLocaleString():s+'$'+Math.round(a);};
const own=id=>S.port[id]?.qty||0;
const nw=()=>{let t=S.cash;ASSETS.forEach(a=>{const q=own(a.id);if(q)t+=a.price*q;});if(S.loan)t-=S.loan.debt;return t;};
const profit=()=>nw()-50000;
const acount=()=>Object.values(S.port).reduce((s,v)=>s+v.qty,0);

const cpill=a=>{
  const d=(a.price-a.base)/a.base;
  if(d>.0004)return`<span class="cpill up"><i class="ti ti-trending-up"></i>+${(d*100).toFixed(1)}%</span>`;
  if(d<-.0004)return`<span class="cpill dn"><i class="ti ti-trending-down"></i>${(d*100).toFixed(1)}%</span>`;
  return`<span class="cpill fl">—</span>`;
};

function toast(msg,type='inf'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast show ${type}`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);
}

function navClick(tab) {
  const btn = document.getElementById('nav-' + tab);
  if (btn.classList.contains('active')) return; // پێشتر چالاکە، هیچ مەکە

  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // بۆ بجوڵانی ئایکۆن
  const icon = btn.querySelector('svg, i');
  icon.classList.remove('bump');
  void icon.offsetWidth; // ڕیستارتی animation
  icon.classList.add('bump');
}

	  <div class="qty-row">
		<button class="qbtn" onclick="G.qA('sQ','${id}',-1,'sell')">−</button>
		<input type="number" class="qinp" id="sQ" min="1" max="${q}" value="1" oninput="G.qR('${id}','sell')">
		<button class="qbtn" onclick="G.qA('sQ','${id}',1,'sell')">+</button>
	  </div>
	</div>
	<div class="modal-acts"><button class="btn-sell" style="flex:1" onclick="G.doSell('${id}')"><i class="ti ti-arrow-down"></i>بفرۆشە</button></div>`;
  }
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mBg').classList.add('open');
}

function openLoanModal(){
  if(S.loan){toast('پێشتر قەرزت هەیە — سەرەتا ئەوە بگەڕێنەوە','err');return;}
  let body=`<div class="modal-title">ڕاکێشانی قەرز</div>
  <div class="modal-sub">بڕی قەرزەکە هەلبژێرە. ئەگەر لە ماوەی دیاریکراو نەیگەڕاندیتەوە، سوو بەسەریدا زیاد دەکرێت</div>`;
  LOAN_OPTIONS.forEach((o,i)=>{
	body+=`<div class="loan-opt">
	  <div class="loan-opt-row">
		<div>
		  <div class="loan-opt-amt">${fmt(o.amount)}</div>
		  <div class="loan-opt-info">ماوەی گەڕاندنەوە: ${o.days} ڕۆژ · سووی دواخستن: ${(o.rate*100).toFixed(0)}% بۆ هەر ڕۆژێک</div>
		</div>
		<button class="loan-opt-btn" onclick="G.takeLoan(${i})">وەرگرتن</button>
	  </div>
	</div>`;
  });
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mBg').classList.add('open');
}

function openRepayModal(){
  const L=S.loan;if(!L)return;
  const max=Math.min(S.cash,L.debt);
  let body=`<div class="modal-title">گەڕاندنەوەی قەرز</div>
  <div class="modal-sub">کۆی قەرزی ماوە: ${fmt(L.debt)} · کاشت: ${fmt(S.cash)}</div>
  <div class="modal-grid">
	<div class="mc"><div class="mc-lbl">قەرزی سەرەتایی</div><div class="mc-val">${fmt(L.principal)}</div></div>
	<div class="mc"><div class="mc-lbl">زیادکراو بەهۆی دواخستن</div><div class="mc-val" style="color:var(--amber-7)">${fmt(L.totalInterest)}</div></div>
  </div>`;
  if(max<=0){
	body+=`<div class="modal-desc" style="color:var(--red)">پارەی کاشت بەس نییە بۆ گەڕاندنەوەی قەرز.</div>`;
  } else {
	body+=`<div class="qty-wrap">
	  <div class="qty-top"><span class="qty-lbl">بڕی گەڕاندنەوە</span><span class="qty-tot" id="rTot">${fmt(max)}</span></div>
	  <div class="qty-row">
		<button class="qbtn" onclick="G.rAdj(-1000)">−</button>
		<input type="number" class="qinp" id="rQ" min="0" max="${max}" value="${max}" oninput="G.rUpdate()">
		<button class="qbtn" onclick="G.rAdj(1000)">+</button>
	  </div>
	</div>
	<div class="modal-acts"><button class="btn-buy" style="flex:1" onclick="G.doRepay()"><i class="ti ti-credit-card-pay"></i>بیگەڕێنەوە</button></div>`;
  }
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mBg').classList.add('open');
}

function heatColor(pct){
  const p=Math.max(-8,Math.min(8,pct));
  let r,g,b;
  if(p>=0){
    const t=p/8;
    r=Math.round(55+(34-55)*t);
    g=Math.round(65+(197-65)*t);
    b=Math.round(81+(94-81)*t);
  } else {
    const t=(-p)/8;
    r=Math.round(55+(220-55)*t);
    g=Math.round(65+(38-65)*t);
    b=Math.round(81+(38-81)*t);
  }
  return `rgb(${r},${g},${b})`;
}

function renderEcoIndex(){
  const el=document.getElementById('ecoIndexCard');
  if(!el)return;
  const h=S.econHist;
  const last=h[h.length-1].val;
  const prev=h.length>1?h[h.length-2].val:0;
  const chg=last-prev;
  const idxVal=1000*(1+last/100);
  const W=120,H=48,pad=4;
  const vals=h.slice(-30).map(p=>p.val);
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=(maxV-minV)||1;
  const xS=i=>pad+i/(vals.length-1||1)*(W-2*pad);
  const yS=v=>H-pad-(v-minV)/range*(H-2*pad);
  const pts=vals.map((v,i)=>`${xS(i)},${yS(v)}`).join(' ');
  const color=chg>=0?'#22c55e':'#f87171';
  el.innerHTML=`<div class="eco-index-card">
    <div class="eco-index-main">
      <div class="eco-index-lbl">ئیندێکسی گشتی ئابووری</div>
      <div class="eco-index-val">${idxVal.toFixed(1)}<span class="eco-index-chg ${chg>=0?'up':'dn'}">${chg>=0?'▲':'▼'}${Math.abs(chg).toFixed(2)}%</span></div>
    </div>
    <svg class="eco-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </div>`;
}

function renderTicker(){
  const el=document.getElementById('tickerWrap');
  if(!el)return;
  if(el.querySelector('.ticker-track')){
    updateTickerPrices();
    return;
  }
  const items=ASSETS.map(a=>{
    const pct=(a.price-a.base)/a.base*100;
    const dir=pct>0.04?'up':pct<-0.04?'dn':'fl';
    const arrow=dir==='up'?'▲':dir==='dn'?'▼':'—';
    return `<span class="ticker-item" data-asset="${a.id}"><span class="tk-name">${a.name}</span><span class="tk-price">${fmt(a.price)}</span><span class="tk-chg ${dir}"><span class="tk-arrow">${arrow}</span><span class="tk-pct">${Math.abs(pct).toFixed(1)}%</span></span></span>`;
  }).join('');
  el.innerHTML=`<div class="ticker-wrap"><div class="ticker-track">${items}${items}${items}${items}</div></div>`;
}

function updateTickerPrices(){
  ASSETS.forEach(a=>{
    const pct=(a.price-a.base)/a.base*100;
    const dir=pct>0.04?'up':pct<-0.04?'dn':'fl';
    const arrow=dir==='up'?'▲':dir==='dn'?'▼':'—';
    document.querySelectorAll(`.ticker-item[data-asset="${a.id}"]`).forEach(item=>{
      item.querySelector('.tk-price').textContent=fmt(a.price);
      const chg=item.querySelector('.tk-chg');
      chg.className=`tk-chg ${dir}`;
      chg.querySelector('.tk-arrow').textContent=arrow;
      chg.querySelector('.tk-pct').textContent=Math.abs(pct).toFixed(1)+'%';
    });
  });
}


function renderQuickStats(){
  const el=document.getElementById('quickStats');
  if(!el)return;
  const withPct=ASSETS.map(a=>({a,pct:(a.price-a.base)/a.base*100}));
  const gainer=withPct.reduce((b,c)=>c.pct>b.pct?c:b);
  const loser=withPct.reduce((b,c)=>c.pct<b.pct?c:b);
  const mcap=ASSETS.reduce((s,a)=>s+a.price,0);
  el.innerHTML=`
    <div class="qstat"><div class="qstat-lbl">باشترین گەشەسەند</div><div class="qstat-val up">+${gainer.pct.toFixed(1)}%</div><div class="qstat-sub">${gainer.a.name}</div></div>
    <div class="qstat"><div class="qstat-lbl">خراپترین گەشە</div><div class="qstat-val dn">${loser.pct.toFixed(1)}%</div><div class="qstat-sub">${loser.a.name}</div></div>
    <div class="qstat"><div class="qstat-lbl">کۆی بەهای بازاڕ</div><div class="qstat-val">${fmt(mcap)}</div></div>
    <div class="qstat"><div class="qstat-lbl">ژمارەی ئاسێتی چالاک</div><div class="qstat-val">${ASSETS.length}</div></div>`;
}

function renderHeatmap(){
  const el=document.getElementById('heatmapGrid');
  if(!el)return;
  el.innerHTML=ASSETS.map(a=>{
    const pct=(a.price-a.base)/a.base*100;
    const bg=heatColor(pct);
    return `<div class="heat-cell" style="background:${bg}" onclick="G.selectCandleAsset('${a.id}')">
      <div class="heat-name">${a.name}</div>
      <div class="heat-chg">${pct>=0?'+':''}${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function renderNewsFeed(){
  const el=document.getElementById('newsFeed');
  if(!el)return;
  if(!S.newsLog.length){
    el.innerHTML=`<div class="news-viewport"><div class="news-track"><div class="news-item"><div class="news-msg">هێشتا هیچ هەواڵێک نییە — ڕۆژی داهاتوو چاوەڕوان بکە.</div></div></div></div>`;
    return;
  }
  const itemsHtml=S.newsLog.map(n=>`
    <div class="news-item ${n.dir}">
      <div>
        <div class="news-day">ڕۆژی ${n.day}</div>
        <div class="news-msg">${n.msg}</div>
      </div>
    </div>`).join('');
const duration=Math.max(12,Math.min(45,S.newsLog.length*2));
  el.innerHTML=`<div class="news-viewport"><div class="news-track" style="animation-duration:${duration}s">${itemsHtml}${itemsHtml}</div></div>`;
}



const G={
 tab(id,btn){
   document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
   document.getElementById('p-'+id).classList.add('active');

   if(id==='market'){renderCats();this.showCatView();}
   if(id==='portfolio')renderPort();
if(id==='prices'){renderEcoIndex();renderTicker();renderQuickStats();renderHeatmap();renderNewsFeed();}

   if(id==='dashboard'){renderDPort();renderLoan();upStats();}
 },

 showCatView(){
   document.getElementById('catView').style.display='block';
   document.getElementById('itemView').style.display='none';
 },
 selectCandleAsset(id){S.candleAsset=id;toast('چارتی کاندڵ لە هەنگاوی داهاتوو چالاک دەبێت','inf');},

 openCat(cat){
   S.cat=cat;
   const c=CATEGORIES.find(x=>x.id===cat);
   document.getElementById('catTitle').textContent=c.name;
   document.getElementById('catSub').textContent=c.sub;
   document.getElementById('catView').style.display='none';
   document.getElementById('itemView').style.display='block';
   renderMarket();
 },
 backToCats(){
   document.getElementById('catView').style.display='block';
   document.getElementById('itemView').style.display='none';
 },
 fCat(cat,btn){S.cat=cat;document.querySelectorAll('.fc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderMarket();},
 openM:openModal,
 closeM(){document.getElementById('mBg').classList.remove('open');},
 mClose(e){if(e.target.id==='mBg')this.closeM();},
 swSell(id){this.closeM();setTimeout(()=>openModal(id,'sell'),60);},
 qA(inp,id,d,mode){
   const el=document.getElementById(inp),q=own(id);
   let v=(parseInt(el.value)||1)+d;
   v=mode==='sell'?Math.min(Math.max(v,1),q):Math.max(v,1);
   el.value=v;this.qR(id,mode);
 },


 qR(id,mode){
   const a=ASSETS.find(x=>x.id===id);
   const inp=mode==='buy'?'bQ':'sQ',tot=mode==='buy'?'bTot':'sTot';
   const v=parseInt(document.getElementById(inp)?.value)||1;
   const el=document.getElementById(tot);if(el)el.textContent=fmt(a.price*v);
 },
 doBuy(id){
   const a=ASSETS.find(x=>x.id===id);
   const qty=parseInt(document.getElementById('bQ')?.value)||1;
   const total=a.price*qty;
   if(S.cash<total){toast('پارەت بەس نییە!','err');return;}
   S.cash-=total;
   if(!S.port[id])S.port[id]={qty:0,avgBuy:0,totalCost:0};
   const p=S.port[id];p.totalCost=(p.totalCost||0)+total;p.qty+=qty;p.avgBuy=p.totalCost/p.qty;
   upStats();this.closeM();toast(`${a.name} ×${qty} کڕیت — ${fmt(total)}`,'ok');this._ref();
 },
 doSell(id){
   const a=ASSETS.find(x=>x.id===id),q=own(id);
   const qty=Math.min(parseInt(document.getElementById('sQ')?.value)||1,q);
   if(!qty){toast('هیچ نییە!','err');return;}
   const total=a.price*qty,avgBuy=S.port[id]?.avgBuy||0,pnl=(a.price-avgBuy)*qty;
   S.cash+=total;S.port[id].qty-=qty;
   if(S.port[id].qty<=0){S.port[id].totalCost=0;delete S.port[id];}
   upStats();this.closeM();toast(`فرۆشیت ×${qty} — ${fmt(total)} | ${pnl>=0?'+':''}${fmt(pnl)}`,pnl>=0?'ok':'inf');
   this._ref();
   if(nw()>=1e6)setTimeout(()=>toast('پیرۆزبا! بوویتە میلیۆنێر!','ok'),400);
 },
 openLoanModal:openLoanModal,
 openRepayModal:openRepayModal,
 takeLoan(idx){
   const o=LOAN_OPTIONS[idx];
   if(S.loan){toast('پێشتر قەرزت هەیە!','err');return;}
   S.loan={principal:o.amount,debt:o.amount,totalInterest:0,takenDay:S.day,dueDay:S.day+o.days,rate:o.rate};
   S.cash+=o.amount;
   upStats();this.closeM();renderLoan();
   toast(`قەرزی ${fmt(o.amount)} وەرگیرا — تا ڕۆژی ${S.loan.dueDay} بگەڕێنەوە`,'ok');
 },
 rAdj(d){
   const L=S.loan;if(!L)return;
   const max=Math.min(S.cash,L.debt);
   const el=document.getElementById('rQ');
   let v=(parseFloat(el.value)||0)+d;
   v=Math.min(Math.max(v,0),max);
   el.value=v;this.rUpdate();
 },
 rUpdate(){
   const el=document.getElementById('rQ'),tot=document.getElementById('rTot');
   if(!el||!tot)return;
   const v=parseFloat(el.value)||0;
   tot.textContent=fmt(v);
 },
 doRepay(){
   const L=S.loan;if(!L)return;
   const max=Math.min(S.cash,L.debt);
   let amt=parseFloat(document.getElementById('rQ')?.value)||0;
   amt=Math.min(Math.max(amt,0),max);
   if(amt<=0){toast('بڕی دروست بنووسە','err');return;}
   S.cash-=amt;L.debt-=amt;
   if(L.debt<=0.5){
     S.cash+=L.debt;
     S.loan=null;
     toast('قەرزەکەت بە تەواوی گەڕایتەوە! پیرۆزبا','ok');
   } else {
     toast(`${fmt(amt)} لە قەرزەکەت گەڕایتەوە`,'ok');
   }
   upStats();this.closeM();renderLoan();
 },
 nextDay(){
   S.day++;
   const openPrices={};
   ASSETS.forEach(a=>{openPrices[a.id]=a.price;});
   ASSETS.forEach(a=>{const d=(Math.random()-.47)*.065;a.price=Math.max(a.base*.28,a.price*(1+d));});

   let msg='بازاڕ ئارامبوو. هیچ ڕووداوێکی گرینگ ڕووی نەدا.';
   let evDir='fl';
   if(Math.random()<.58){
     const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
     ev.cats.forEach(cat=>ASSETS.filter(a=>a.cat===cat).forEach(a=>{a.price=Math.max(a.base*.22,a.price*(1+(ev.fx+(Math.random()-.5)*.03)));}));
     msg=ev.msg;evDir=ev.fx>0?'up':'dn';
   }

   ASSETS.forEach(a=>{
     const op=openPrices[a.id],cl=a.price;
     const hi=Math.max(op,cl)*(1+Math.random()*.012);
     const lo=Math.min(op,cl)*(1-Math.random()*.012);
     HIST[a.id].push({day:S.day,open:op,high:hi,low:lo,close:cl});
   });

   const avgPct=ASSETS.reduce((s,a)=>s+(a.price-a.base)/a.base,0)/ASSETS.length*100;
   S.econHist.push({day:S.day,val:avgPct});
   S.newsLog.unshift({day:S.day,msg,dir:evDir});
   if(S.newsLog.length>30)S.newsLog.pop();

   let yi=0;ASSETS.forEach(a=>{const q=own(a.id);if(q>0&&a.yield>0)yi+=a.price*a.yield*q/30;});
   if(yi>0){S.cash+=yi;}
   if(S.loan&&S.day>S.loan.dueDay){
     const interest=S.loan.debt*S.loan.rate;
     S.loan.debt+=interest;
     S.loan.totalInterest+=interest;
   }
   upStats();renderLoan();this._ref();
 },


 _ref(){
   const a=document.querySelector('.page.active');if(!a)return;
   const id=a.id.replace('p-','');
   if(id==='market'){
     const itemView=document.getElementById('itemView');
     if(itemView&&itemView.style.display!=='none')renderMarket();
   }
   if(id==='portfolio')renderPort();
if(id==='prices'){renderEcoIndex();renderTicker();renderQuickStats();renderHeatmap();renderNewsFeed();}


   if(id==='dashboard')renderDPort();
 },

};
upStats();renderLoan();


// ── AUTO TIMER ──
const INTERVAL_MS = 60 * 1000; // 60 چرکە
let timerStart = Date.now();

function updateCountdown(){
  const elapsed = Date.now() - timerStart;
  const remaining = Math.max(0, INTERVAL_MS - elapsed);
  const secs = Math.ceil(remaining / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  const el = document.getElementById('cdTimer');
  const fill = document.getElementById('cdFill');
  if(el) el.textContent = m + ':' + String(s).padStart(2,'0');
  if(fill) fill.style.width = ((INTERVAL_MS - remaining) / INTERVAL_MS * 100) + '%';
  if(remaining <= 0){
	timerStart = Date.now();
	G.nextDay();
  }
}
setInterval(updateCountdown, 500);
updateCountdown();

</script>
