<style>

    --bg: #F7F5F0;
    --surface: #FFFFFF;

    --text-primary: #1A1714;
    --text-secondary: #6B6560;
    --text-muted: #A09A94;
    --accent: #C8452A;
    --accent-light: #F5EAE7;

    --green-light: #E8F4EE;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
  }

  .logo span {
    color: var(--accent);
  }

  .header-meta {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot-live {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MAIN */
  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* DATE BAR */
  .date-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .date-label {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .progress-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .progress-label strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--progress-bg);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* CARD */

    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .q-number {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .q-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 28px;
  }

  /* OPTIONS */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 18px 16px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    font-family: var(--font);
    position: relative;
    overflow: hidden;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .option-btn .opt-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    display: block;
    margin-bottom: 4px;
  }

  .option-btn .opt-pct {
    font-size: 13px;
    color: var(--text-muted);
    display: none;
  }

  /* Result state */
  .option-btn.voted {
    cursor: default;
  }

  .option-btn.voted .opt-pct {
    display: block;
  }

  .option-btn.winner {
    border-color: var(--green);
    background: var(--green-light);
  }

  .option-btn.winner .opt-text {
    color: var(--green);
  }

  .option-btn.winner .opt-pct {
    color: var(--green);
    font-weight: 700;
  }

  .option-btn.my-pick {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .option-btn.my-pick .opt-text {
    color: var(--accent);
  }

  .option-btn.my-pick .opt-pct {
    color: var(--accent);
    font-weight: 700;
  }

    bottom: 0;
    right: 0;
    height: 3px;
    background: currentColor;
    opacity: 0.3;
    transition: width 0.6s ease;
    width: 0;
  }

  .option-btn.winner .fill-bar { background: var(--green); opacity: 0.4; }
  .option-btn.my-pick .fill-bar { background: var(--accent); opacity: 0.4; }

  .total-votes {

    font-size: 13px;
    color: var(--text-muted);
    text-align: center;

    height: 6px;
    background: var(--progress-bg);
    border-radius: 3px;
    flex: 1;
    margin: 0 12px;

  }

  .history-opt-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
  }

    color: var(--text-muted);

    text-align: left;
  }

    bottom: 0;
    right: 0;
    left: 0;

    border-top: 1px solid var(--border);

  .nav-btn.active {

const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

async function supabase(method, path, body = null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json().catch(() => null);
}

// Get today's 10 questions based on date seed
function getTodaysQuestions() {
  const today = getDateKey();
  // Use date as seed to pick 10 questions
  let seed = today.replace(/-/g, '');
  let idx = parseInt(seed) % QUESTION_POOL.length;
  
  const picked = [];
  const used = new Set();
  let i = idx;
  while (picked.length < 10) {
    const q = QUESTION_POOL[i % QUESTION_POOL.length];
    if (!used.has(q.id)) {
      picked.push(q);
      used.add(q.id);
    }
    i++;
  }
  return picked;
}

let myVotes = {}; // { questionId: 'a' | 'b' }
let currentView = 'today';

function getDateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadMyVotes() {
  try {
    const d = getDateKey();
    const raw = localStorage.getItem(`kurdipoll_votes_${d}`);
    return raw ? JSON.parse(raw) : {};

}

function saveMyVotes() {

}

// =====================
// SUPABASE OPERATIONS
// =====================
async function getVotesForQuestion(qid) {
  try {
    const today = getDateKey();
    const data = await supabase('GET', `votes?question_id=eq.${qid}&date=eq.${today}&select=option,count`);
    const result = { a: 0, b: 0 };
    if (data) {
      data.forEach(row => { result[row.option] = parseInt(row.count) || 0; });
    }
    return result;
  } catch {
    return { a: 0, b: 0 };
  }
}

async function castVote(qid, option) {
  try {
    const today = getDateKey();
    // Upsert vote — increment
    await supabase('POST', 'votes', {
      question_id: qid,
      date: today,
      option: option,
      count: 1
    });
  } catch { /* fail silently */ }
}

async function loadAllVotes() {
  try {
    const today = getDateKey();
    const qids = todaysQuestions.map(q => `question_id=eq.${q.id}`).join(',');
    const data = await supabase('GET', `votes?date=eq.${today}&select=question_id,option,count`);
    const result = {};
    if (data) {
      data.forEach(row => {
        if (!result[row.question_id]) result[row.question_id] = { a: 0, b: 0 };
        result[row.question_id][row.option] = parseInt(row.count) || 0;
      });
    }
    return result;
  } catch {
    return {};
  }
}

function formatDate(d) {
  const days = ['یەکشەممە','دووشەممە','سێشەممە','چوارشەممە','پێنجشەممە','هەینی','شەممە'];
  const months = ['کانوونی دووەم','شوبات','ئازار','نیسان','ئایار','حوزەیران','تەممووز','ئاب','ئەیلوول','تشرینی یەکەم','تشرینی دووەم','کانوونی یەکەم'];
  return `${days[d.getDay()]}، ${d.getDate()}ی ${months[d.getMonth()]}`;
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  const answered = Object.keys(myVotes).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('progress-fill').style.width = `${(answered / 10) * 100}%`;

  container.innerHTML = todaysQuestions.map((q, i) => {
    const myPick = myVotes[q.id];
    const v = votes[q.id] || { a: 0, b: 0 };
    const total = v.a + v.b;
    const pctA = total ? Math.round((v.a / total) * 100) : 0;
    const pctB = total ? Math.round((v.b / total) * 100) : 0;
    const winnerA = pctA > pctB;
    const winnerB = pctB > pctA;
    const voted = !!myPick;

    return `
    <div class="card" id="card-${q.id}">
      <div class="q-number">پرسیار ${i + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        <button class="option-btn ${voted ? 'voted' : ''} ${voted && winnerA ? 'winner' : ''} ${myPick === 'a' ? 'my-pick' : ''}"
          onclick="vote('${q.id}', 'a')"
          ${voted ? 'disabled' : ''}>
          <span class="opt-text">${q.a}</span>
          <span class="opt-pct">${pctA}٪</span>
          <div class="fill-bar" style="width:${voted ? pctA : 0}%"></div>
        </button>
        <button class="option-btn ${voted ? 'voted' : ''} ${voted && winnerB ? 'winner' : ''} ${myPick === 'b' ? 'my-pick' : ''}"
          onclick="vote('${q.id}', 'b')"
          ${voted ? 'disabled' : ''}>
          <span class="opt-text">${q.b}</span>
          <span class="opt-pct">${pctB}٪</span>
          <div class="fill-bar" style="width:${voted ? pctB : 0}%"></div>
        </button>
      </div>
      ${voted ? `<div class="total-votes">${total} دەنگی کۆتایی</div>` : ''}
    </div>`;
  }).join('');
}

async function vote(qid, option) {
  if (myVotes[qid]) return;
  myVotes[qid] = option;
  saveMyVotes();

  // Optimistic update
  if (!votes[qid]) votes[qid] = { a: 0, b: 0 };
  votes[qid][option]++;

  renderQuestions();

  // Send to Supabase
  await castVote(qid, option);

  // Refresh votes from server
  const fresh = await loadAllVotes();
  if (Object.keys(fresh).length) votes = { ...votes, ...fresh };
  renderQuestions();
}

// =====================
// HISTORY
// =====================
async function loadHistory() {
  try {
    // Get all past dates from localStorage
    const container = document.getElementById('history-container');
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('kurdipoll_votes_')) {
        const d = k.replace('kurdipoll_votes_', '');
        if (d !== getDateKey()) keys.push(d);
      }
    }

    if (keys.length === 0) {
      container.innerHTML = `<div class="empty-state"><p>ئەنجامی ئێستا بەردەست نیە.<br>هەموو شەوێک کاژمێر ١٢ ئەنجامەکان دەکرێنەوە.</p></div>`;
      return;
    }

    keys.sort().reverse();

    // Load from Supabase for each date
    let html = '';
    for (const d of keys.slice(0, 7)) {
      try {
        const data = await supabase('GET', `votes?date=eq.${d}&select=question_id,option,count`);
        const dayVotes = {};
        if (data) {
          data.forEach(row => {
            if (!dayVotes[row.question_id]) dayVotes[row.question_id] = { a: 0, b: 0 };
            dayVotes[row.question_id][row.option] = parseInt(row.count) || 0;
          });
        }

        // Get seed questions for that date
        const seed = d.replace(/-/g, '');
        let idx = parseInt(seed) % QUESTION_POOL.length;
        const picked = [];
        const used = new Set();
        let i = idx;
        while (picked.length < 10) {
          const q = QUESTION_POOL[i % QUESTION_POOL.length];
          if (!used.has(q.id)) { picked.push(q); used.add(q.id); }
          i++;
        }

        html += `<div class="history-card">
          <div class="history-date">${d}</div>
          <div class="history-options">
            ${picked.map(q => {
              const v = dayVotes[q.id] || { a: 0, b: 0 };
              const total = v.a + v.b;
              const pctA = total ? Math.round((v.a / total) * 100) : 0;
              const pctB = total ? Math.round((v.b / total) * 100) : 0;
              const winA = pctA >= pctB;
              return `
              <div class="history-q">${q.text}</div>
              <div class="history-opt ${winA ? 'win' : ''}">
                <span style="min-width:100px;font-size:13px">${q.a}</span>
                <div class="history-opt-bar"><div class="history-opt-fill" style="width:${pctA}%"></div></div>
                <span class="history-opt-pct">${pctA}٪</span>
              </div>
              <div class="history-opt ${!winA ? 'win' : ''}">
                <span style="min-width:100px;font-size:13px">${q.b}</span>
                <div class="history-opt-bar"><div class="history-opt-fill" style="width:${pctB}%"></div></div>
                <span class="history-opt-pct">${pctB}٪</span>
              </div>`;
            }).join('<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">')}
          </div>
        </div>`;
      } catch { /* skip */ }
    }

    container.innerHTML = html || `<div class="empty-state"><p>داتای مێژوو نەدۆزرایەوە.</p></div>`;
  } catch {
    document.getElementById('history-container').innerHTML = `<div class="empty-state"><p>هەڵەیەک ڕووی دا.</p></div>`;
  }
}

// =====================
// COUNTDOWN
// =====================
function updateCountdown() {
  const now = new Date();
  const midnight = new Date();
  midnight.setHours(23, 59, 59, 999);
  const diff = midnight - now;
  const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
  const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
  const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
  document.getElementById('countdown').textContent = `${h}:${m}:${s}`;
}

// =====================
// NAV
// =====================
function showView(view) {
  currentView = view;
  document.getElementById('today-view').style.display = view === 'today' ? 'block' : 'none';
  document.getElementById('history-view').style.display = view === 'history' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && view === 'today') || (i === 1 && view === 'history'));
  });
  if (view === 'history') loadHistory();
}

// =====================
// INIT
// =====================
async function init() {
  const now = new Date();
  document.getElementById('header-date').textContent = formatDate(now);
  document.getElementById('today-label').textContent = formatDate(now);

  todaysQuestions = getTodaysQuestions();
  myVotes = loadMyVotes();
  document.getElementById('total-count').textContent = '10';

  // Load votes
  votes = await loadAllVotes();
  renderQuestions();

  // Countdown
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Auto-refresh votes every 30s
  setInterval(async () => {
    if (currentView === 'today') {
      const fresh = await loadAllVotes();
      if (Object.keys(fresh).length) { votes = fresh; renderQuestions(); }
    }
  }, 30000);
}

init();
</script>
